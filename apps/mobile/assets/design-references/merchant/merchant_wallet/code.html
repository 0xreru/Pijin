<style>
        .zig-zag-bottom {
            background: linear-gradient(-45deg, transparent 16px, #ffffff 0), linear-gradient(45deg, transparent 16px, #ffffff 0);
            background-repeat: repeat-x;
            background-position: left bottom;
            background-size: 22px 32px;
            content: "";
            display: block;
            width: 100%;
            height: 16px;
            position: absolute;
            bottom: -16px;
            left: 0;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.02));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-lg antialiased min-h-screen selection:bg-surface-variant">
<!-- TopAppBar -->
<header class="bg-background dark:bg-background text-primary dark:text-inverse-primary w-full pt-4 px-margin-edge flex flex-col justify-start items-start px-5 flat sticky top-0 z-40">
<div class="flex justify-between items-center w-full h-[56px]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[28px] hover:opacity-80 active:scale-95 transition-transform cursor-pointer" data-icon="storefront">storefront</span>
<h1 class="font-display-lg text-[24px] tracking-tighter text-primary dark:text-inverse-primary font-bold">NOIR PAY</h1>
</div>
<button class="hover:opacity-80 active:scale-95 transition-transform flex items-center justify-center min-w-[48px] min-h-[48px]">
<span class="material-symbols-outlined text-[28px]" data-icon="qr_code_2">qr_code_2</span>
</button>
</div>
</header>
<!-- Main Canvas -->
<main class="px-margin-edge pb-32 pt-4 flex flex-col">
<!-- Wallet Card Stack Metaphor (Level 1) -->
<section class="relative z-20">
<!-- Background card hinting at depth -->
<div class="absolute top-0 left-0 w-full h-full bg-surface-container-high rounded-xl transform translate-y-3 scale-[0.96] z-0"></div>
<!-- Primary Wallet Card -->
<div class="bg-primary text-on-primary rounded-xl p-6 relative z-10 shadow-[0_12px_24px_rgba(0,0,0,0.15)] flex flex-col justify-between min-h-[220px]">
<div class="flex flex-col gap-1">
<p class="font-label-sm text-label-sm text-on-primary-container uppercase tracking-widest">Total Balance</p>
<h2 class="font-display-lg text-display-lg mt-1 tracking-tight">₱10,550</h2>
</div>
<div class="flex flex-col gap-3 border-t border-on-surface-variant pt-5 mt-8">
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.5)]" style="background-color: #10B981;"></div>
<span class="font-data-mono text-data-mono text-surface-container-lowest">Available to Withdraw: ₱9,300</span>
</div>
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full" style="background-color: #F59E0B;"></div>
<span class="font-data-mono text-data-mono text-on-primary-container">Pending Sync: ₱1,250</span>
</div>
</div>
</div>
</section>
<!-- Action Area (Layered over the card bottom) -->
<section class="flex flex-col gap-4 mt-stack-overlap relative z-30 pt-10 px-2">
<button class="w-full h-[56px] bg-primary text-on-primary rounded-full font-label-sm text-label-sm flex items-center justify-center hover:opacity-80 active:scale-95 transition-all shadow-[0_8px_16px_rgba(0,0,0,0.12)] uppercase tracking-widest">
                Cash Out
            </button>
<button class="w-full h-[48px] text-primary font-label-sm text-label-sm flex items-center justify-center gap-2 hover:opacity-80 active:scale-95 transition-all uppercase tracking-widest">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'wght' 600;">sync</span>
                Sync Offline Sales
            </button>
</section>
<!-- Ledger List (Receipt Metaphor, Level 2) -->
<section class="mt-6 relative z-10 w-[94%] mx-auto">
<!-- Hardware Slot Metaphor -->
<div class="w-full h-3 bg-inverse-surface rounded-t-lg shadow-inner mx-auto opacity-90 relative z-20"></div>
<!-- Receipt Body -->
<div class="bg-surface-container-lowest border border-surface-container border-t-0 pt-6 px-5 pb-10 flex flex-col relative z-10 shadow-sm mt-[-4px]">
<h3 class="font-headline-md text-headline-md text-primary mb-6">Settlement History</h3>
<div class="flex flex-col">
<!-- Ledger Item 1 -->
<div class="flex justify-between items-start py-4 border-b border-surface-container border-dashed hover:bg-surface-bright transition-colors cursor-pointer group">
<div class="flex flex-col gap-1">
<span class="font-label-sm text-label-sm text-primary group-hover:text-secondary transition-colors">Cash Out to GCash</span>
<span class="font-data-mono text-[11px] text-on-primary-container tracking-wider">TODAY, 09:41 AM</span>
</div>
<span class="font-data-mono text-data-mono text-primary font-bold">-₱5,000</span>
</div>
<!-- Ledger Item 2 -->
<div class="flex justify-between items-start py-4 border-b border-surface-container border-dashed hover:bg-surface-bright transition-colors cursor-pointer group">
<div class="flex flex-col gap-1">
<span class="font-label-sm text-label-sm text-primary group-hover:text-secondary transition-colors">Offline Sync</span>
<span class="font-data-mono text-[11px] text-on-primary-container tracking-wider">YESTERDAY, 10:00 PM</span>
</div>
<span class="font-data-mono text-data-mono text-secondary">+₱3,200</span>
</div>
<!-- Ledger Item 3 -->
<div class="flex justify-between items-start py-4 border-b border-surface-container border-dashed hover:bg-surface-bright transition-colors cursor-pointer group">
<div class="flex flex-col gap-1">
<span class="font-label-sm text-label-sm text-primary group-hover:text-secondary transition-colors">Cash Out to Bank</span>
<span class="font-data-mono text-[11px] text-on-primary-container tracking-wider">OCT 12, 04:15 PM</span>
</div>
<span class="font-data-mono text-data-mono text-primary font-bold">-₱2,500</span>
</div>
</div>
<!-- Torn Paper Effect -->
<div class="zig-zag-bottom"></div>
</div>
</section>

<nav class="bg-primary dark:bg-primary rounded-full mx-auto mb-4 w-[280px] h-14 shadow-[0px_4px_12px_rgba(0,0,0,0.1)] fixed bottom-4 left-0 right-0 z-50 flex justify-around items-center px-4 md:hidden">

<span class="material-symbols-outlined text-[24px]" data-icon="home">home</span>
</button>
<button aria-label="qr_code_scanner" class="flex items-center justify-center text-on-primary opacity-40 hover:opacity-70 active:scale-90 transition-all duration-200 w-12 h-12">
<span class="material-symbols-outlined text-[24px]" data-icon="qr_code_scanner">qr_code_scanner</span>
</button>
<!-- Active Tab: Wallet -->
<button aria-label="account_balance_wallet" class="flex items-center justify-center text-on-primary opacity-100 scale-110 active:scale-90 transition-all duration-200 w-12 h-12 relative">
<span class="material-symbols-outlined text-[24px]" data-icon="account_balance_wallet" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
<div class="absolute -bottom-2 w-1 h-1 bg-on-primary rounded-full"></div>
</button>
<button aria-label="settings" class="flex items-center justify-center text-on-primary opacity-40 hover:opacity-70 active:scale-90 transition-all duration-200 w-12 h-12">
<span class="material-symbols-outlined text-[24px]" data-icon="settings">settings</span>
</button>
