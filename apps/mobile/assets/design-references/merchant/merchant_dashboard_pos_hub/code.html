<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Merchant Dashboard - Radical Minimalism</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-container": "#dfe0e0",
                    "inverse-surface": "#303030",
                    "secondary-fixed": "#e2e2e2",
                    "inverse-primary": "#c6c6c6",
                    "on-tertiary": "#ffffff",
                    "on-secondary-container": "#616363",
                    "on-surface-variant": "#4c4546",
                    "surface-container-high": "#e8e8e8",
                    "primary": "#000000",
                    "tertiary-fixed": "#e2e2e4",
                    "on-secondary-fixed": "#1a1c1c",
                    "on-primary-fixed-variant": "#474747",
                    "on-background": "#1b1b1b",
                    "on-primary-container": "#848484",
                    "surface-dim": "#dadada",
                    "surface-container": "#eeeeee",
                    "on-tertiary-fixed": "#1a1c1d",
                    "surface-variant": "#e2e2e2",
                    "surface-bright": "#f9f9f9",
                    "secondary": "#5d5f5f",
                    "on-error": "#ffffff",
                    "error": "#ba1a1a",
                    "surface": "#f9f9f9",
                    "outline": "#7e7576",
                    "on-error-container": "#93000a",
                    "on-surface": "#1b1b1b",
                    "on-secondary": "#ffffff",
                    "outline-variant": "#cfc4c5",
                    "tertiary": "#000000",
                    "on-primary-fixed": "#1b1b1b",
                    "on-tertiary-fixed-variant": "#454749",
                    "secondary-fixed-dim": "#c6c6c7",
                    "inverse-on-surface": "#f1f1f1",
                    "surface-tint": "#5e5e5e",
                    "primary-fixed-dim": "#c6c6c6",
                    "error-container": "#ffdad6",
                    "background": "#f9f9f9",
                    "tertiary-fixed-dim": "#c6c6c8",
                    "surface-container-highest": "#e2e2e2",
                    "on-primary": "#ffffff",
                    "tertiary-container": "#1a1c1d",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-container": "#838486",
                    "on-secondary-fixed-variant": "#454747",
                    "surface-container-low": "#f3f3f3",
                    "primary-container": "#1b1b1b",
                    "primary-fixed": "#e2e2e2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-overlap": "-16px",
                    "margin-edge": "20px",
                    "touch-target-min": "48px",
                    "gutter": "12px"
            },
            "fontFamily": {
                    "display-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "data-mono": ["JetBrains Mono"]
            },
            "fontSize": {
                    "display-lg": ["48px", {"lineHeight": "52px", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "data-mono": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500"}]
            }
          }
        }
      }
    </script>
<style>
        /* Minimalist scrollbar hide for cleaner UI */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* CSS trick for torn receipt bottom */
        .receipt-bottom {
            background-image: radial-gradient(circle at 6px 100%, transparent 6px, #ffffff 6px);
            background-size: 16px 16px;
            background-repeat: repeat-x;
            background-position: bottom;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen font-body-lg pb-[160px] flex flex-col relative overflow-x-hidden">
<!-- TopAppBar JSON execution -->
<header class="bg-background w-full pt-4 px-margin-edge flex flex-col justify-start items-start px-5 pb-2">
<div class="flex w-full items-center justify-between">
<button aria-label="Store Menu" class="min-w-[48px] min-h-[48px] flex items-center justify-start text-primary hover:opacity-80 active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">storefront</span>
</button>
<h1 class="font-display-lg text-headline-md tracking-tighter text-primary">NOIR PAY</h1>
<button aria-label="QR Code Profile" class="min-w-[48px] min-h-[48px] flex items-center justify-end text-primary hover:opacity-80 active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">qr_code_2</span>
</button>
</div>
<div class="w-full text-center mt-[-8px] mb-2">
<span class="font-label-sm text-label-sm text-secondary tracking-widest uppercase">Sari-Sari Store</span>
</div>
</header>
<main class="flex-1 flex flex-col w-full max-w-md mx-auto relative z-10">
<!-- PIN Badge -->
<div class="flex justify-center mt-2 mb-6 px-margin-edge">
<div class="bg-surface-container-highest rounded-full px-4 py-2 flex items-center gap-3 border border-outline-variant shadow-sm">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="font-data-mono text-data-mono text-primary">Security PIN: 8492</span>
</div>
</div>
<!-- Center Metric (Wallet Level 1) -->
<section class="px-margin-edge mb-8">
<div class="bg-primary rounded-xl p-8 flex flex-col items-center justify-center shadow-lg relative overflow-hidden">
<div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjQiIGZpbGw9IiMyMjIiPjwvcmVjdD48cGF0aCBkPSJNMCAwTDIgMkgwWiIgZmlsbD0iIzMzMyI+PC9wYXRoPjwvc3ZnPg==')] opacity-20"></div>
<h2 class="font-label-sm text-label-sm text-inverse-primary uppercase tracking-widest mb-3 relative z-10">PENDING OFFLINE SALES</h2>
<div class="font-display-lg text-display-lg text-on-primary tracking-tighter relative z-10">₱1,250</div>
</div>
</section>
<!-- List Area (Receipt Level 2) -->
<section class="px-margin-edge mb-12 relative">
<div class="bg-surface-container-lowest rounded-t-xl p-6 pb-8 border border-outline-variant border-b-0 shadow-sm relative receipt-bottom">
<!-- Receipt Slot Metaphor -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-1/3 h-1.5 bg-surface-container-highest rounded-b-md"></div>
<h3 class="font-label-sm text-label-sm text-secondary mb-6 mt-2 uppercase tracking-widest flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">receipt_long</span>
                    Recent Scans
                </h3>
<ul class="flex flex-col">
<li class="flex justify-between items-center py-4 border-b border-surface-container border-dashed">
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-secondary-container"></div>
<span class="font-data-mono text-data-mono text-on-surface-variant">Voucher #8812</span>
</div>
<span class="font-data-mono text-data-mono text-primary font-bold">₱252</span>
</li>
<li class="flex justify-between items-center py-4 border-b border-surface-container border-dashed">
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-secondary-container"></div>
<span class="font-data-mono text-data-mono text-on-surface-variant">Voucher #8809</span>
</div>
<span class="font-data-mono text-data-mono text-primary font-bold">₱500</span>
</li>
<li class="flex justify-between items-center py-4 border-b border-surface-container border-dashed opacity-50">
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-secondary-container"></div>
<span class="font-data-mono text-data-mono text-on-surface-variant">Voucher #8741</span>
</div>
<span class="font-data-mono text-data-mono text-primary font-bold">₱120</span>
</li>
</ul>
</div>
<!-- Extra div to finalize the jagged bottom edge visual securely -->
<div class="h-4 bg-surface-container-lowest border-x border-outline-variant rounded-b-md" style="clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 95% 80%, 90% 100%, 85% 80%, 80% 100%, 75% 80%, 70% 100%, 65% 80%, 60% 100%, 55% 80%, 50% 100%, 45% 80%, 40% 100%, 35% 80%, 30% 100%, 25% 80%, 20% 100%, 15% 80%, 10% 100%, 5% 80%, 0% 100%);"></div>
</section>
</main>
<!-- Primary Action Layer -->
<div class="fixed bottom-[90px] left-0 right-0 px-margin-edge z-40 max-w-md mx-auto pointer-events-none">
<button class="pointer-events-auto w-full h-[56px] bg-primary text-on-primary font-headline-md text-[18px] rounded-lg flex items-center justify-center gap-3 active:scale-95 transition-transform shadow-[0px_8px_24px_rgba(0,0,0,0.2)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
            Scan Customer QR
        </button>
</div>
<!-- BottomNavBar JSON execution -->
<nav class="fixed bottom-4 left-0 right-0 z-50 flex justify-around items-center px-4 max-w-md mx-auto">
<div class="bg-primary rounded-full mx-auto w-[280px] h-14 shadow-[0px_4px_12px_rgba(0,0,0,0.1)] flex justify-around items-center px-4 border border-[#222]">
<!-- Active Tab: Home (Dashboard semantic match) -->
<button aria-label="Home" class="min-w-[48px] min-h-[48px] flex items-center justify-center text-on-primary opacity-100 scale-110 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
</button>
<!-- Inactive Tab -->
<button aria-label="Scan" class="min-w-[48px] min-h-[48px] flex items-center justify-center text-on-primary opacity-40 hover:opacity-70 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">qr_code_scanner</span>
</button>
<!-- Inactive Tab -->
<button aria-label="Wallet" class="min-w-[48px] min-h-[48px] flex items-center justify-center text-on-primary opacity-40 hover:opacity-70 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">account_balance_wallet</span>
</button>
<!-- Inactive Tab -->
<button aria-label="Settings" class="min-w-[48px] min-h-[48px] flex items-center justify-center text-on-primary opacity-40 hover:opacity-70 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">settings</span>
</button>
</div>
</nav>
</body></html>
