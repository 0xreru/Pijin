name: Mobile CI

on:
  push:
    branches: [ "main" ]
    paths: ['apps/mobile/**']
  
  pull_request:
    branches: [ "main" ]
    paths: ['apps/mobile/**']

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck and Bundle Smoke Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/mobile
    
    env:
      EXPO_PUBLIC_API_BASE_URL: https://ci.example.com
      EXPO_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-dummy-project-id
      EXPO_PUBLIC_WALLETCONNECT_RELAY_URL: wss://relay.walletconnect.com
      EXPO_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
      EXPO_PUBLIC_CONTRACT_ID: C_DUMMY_CONTRACT
      EXPO_PUBLIC_TOKEN_ID: C_DUMMY_TOKEN
      EXPO_PUBLIC_STELLAR_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
      EXPO_PUBLIC_STELLAR_WALLET_CHAIN: stellar:testnet
      EXPO_PUBLIC_SMS_GATEWAY_NUMBER: "+10000000000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install Monorepo Dependencies
        run: npm ci
        working-directory: .
      - run: npx tsc --noEmit
      - run: npx expo export --platform android --platform ios
